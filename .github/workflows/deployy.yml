# GitHub Actions workflow for Anuska's Portfolio
# Configured to automatically trigger on:
# 1. Any 'push' event to the 'main' or 'master' branches (Production deploys/checks)
# 2. Any pull request targeting 'main' or 'master'
name: Build and Deploy Portfolio


on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-lint:
    name: Build, Lint & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node_version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          NODE_ENV: production

      # Optional step: This creates an archive of the build artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-assets
          path: dist/
          retention-days: 5

